<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful – Mes Decor</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #fdf6ee;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.08);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 26px; font-weight: 700; color: #1a1008; margin-bottom: 10px; }
    p  { font-size: 15px; color: #7a6a55; line-height: 1.6; margin-bottom: 28px; }
    a  {
      display: inline-block;
      background: #c9a84c;
      color: #fff;
      padding: 12px 32px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }
    a:hover { background: #b8973d; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for booking with Mes Decor.<br />We'll be in touch shortly to confirm your reservation.</p>
    <a href="/">Back to Home</a>
  </div>
</body>
</html>
